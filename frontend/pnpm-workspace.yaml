packages:
  - 'apps/*'
  - 'packages/*'

strictPeerDependencies: true
autoInstallPeers: false

# pnpm 11 defaults to a one-day release delay, but its built-in policy is
# intentionally non-strict. Make the audited supply-chain gate explicit so a
# new dependency cannot silently fall back to a too-recent release.
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
trustPolicy: no-downgrade
# semver 6.3.1 is a mature transitive release used by the current React-hooks
# Babel 7 chain. Its historical publish predates registry provenance, so the
# downgrade heuristic cannot compare it meaningfully; keep the exception exact.
trustPolicyExclude:
  - semver@6.3.1
catalogMode: strict
cleanupUnusedCatalogs: true

overrides:
  '@types/node': 'catalog:'

