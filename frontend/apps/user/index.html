<!doctype html>
<html>
  <!--
    Dev entry. Mirrors public/theme/default/dashboard.blade.php so `pnpm dev`
    (:5173) boots with the SAME legacy contract as production: the original
    components.chunk.css + umi.css, window.settings, and the per-locale i18n
    maps. The rewrite's own styles come from main.tsx (globals.css, injected
    by Vite) and the per-color theme CSS is added at runtime by
    applyLegacySettings. The /theme/* assets are served from repo public/theme
    by legacyThemePlugin. Only main.tsx replaces the original umi.js app entry;
    the original vendors/components chunks stay before it in body order to
    provide bundled helpers such as DarkReader.
  -->
  <head>
    <link rel="stylesheet" href="/theme/default/assets/components.chunk.css" />
    <link rel="stylesheet" href="/theme/default/assets/umi.css" />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no"
    />
    <meta name="theme-color" content="#0665d0" />
    <title>V2Board</title>
    <script>
      window.routerBase = '/';
    </script>
    <script>
      window.settings = {
        title: 'V2Board',
        assets_path: '/theme/default/assets',
        theme: {
          sidebar: 'light',
          header: 'dark',
          color: 'default',
        },
        version: 'dev',
        background_url: '',
        description: 'V2Board',
        i18n: ['zh-CN', 'en-US', 'ja-JP', 'vi-VN', 'ko-KR', 'zh-TW', 'fa-IR'],
        logo: '',
      };
    </script>
    <script src="/theme/default/assets/i18n/zh-CN.js"></script>
    <script src="/theme/default/assets/i18n/zh-TW.js"></script>
    <script src="/theme/default/assets/i18n/en-US.js"></script>
    <script src="/theme/default/assets/i18n/ja-JP.js"></script>
    <script src="/theme/default/assets/i18n/vi-VN.js"></script>
    <script src="/theme/default/assets/i18n/ko-KR.js"></script>
    <script src="/theme/default/assets/i18n/fa-IR.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var recoveryVersion = 'white-screen-recovery-30';
        var storageKey = 'v2board:dev-entry-recovery:' + recoveryVersion;
        var maxAttempts = 3;
        var delay = 2500;
        var clearDelay = 3000;
        var timer;
        var legacyRoutes = [
          '/dashboard',
          '/forgetpassword',
          '/',
          '/invite',
          '/knowledge',
          '/login',
          '/node',
          '/order/:trade_no',
          '/order',
          '/plan/:plan_id',
          '/plan',
          '/profile',
          '/register',
          '/ticket/:ticket_id',
          '/ticket',
          '/traffic',
        ];
        var legacyPublicRoutes = ['/', '/login', '/register', '/forgetpassword'];

        function clearOldRecoveryState() {
          var prefixes = [
            'v2board:dev-entry-recovery:',
            'v2board:white-screen-recovery:',
            'v2board:dev-module-recovery:',
          ];
          for (var index = window.sessionStorage.length - 1; index >= 0; index -= 1) {
            var key = window.sessionStorage.key(index);
            if (!key || key.indexOf(':' + recoveryVersion + ':') !== -1) continue;
            for (var prefixIndex = 0; prefixIndex < prefixes.length; prefixIndex += 1) {
              if (key.indexOf(prefixes[prefixIndex]) === 0) {
                window.sessionStorage.removeItem(key);
                break;
              }
            }
          }
        }

        function clearBrowserCaches() {
          if (!('caches' in window)) return;
          window.caches
            .keys()
            .then(function (keys) {
              keys.forEach(function (key) {
                window.caches.delete(key);
              });
            })
            .catch(function () {});
        }

        clearOldRecoveryState();
        clearBrowserCaches();

        function normalizePath(path) {
          var next = String(path || '').trim();
          if (!next || next === '#') return '/';
          return next.charAt(0) === '/' ? next : '/' + next;
        }

        function routePattern(route) {
          var escaped = route.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/:[^/]+/g, '[^/]+');
          return new RegExp('^' + escaped + '$');
        }

        function routePrefixLength(path, route) {
          var escaped;
          var match;
          if (route === '/') return null;
          if (route.indexOf(':') === -1) {
            return path.indexOf(route + '/') === 0 ? route.length : null;
          }
          escaped = route.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/:[^/]+/g, '[^/]+');
          match = new RegExp('^(' + escaped + ')(?=/)').exec(path);
          return match && match[1] ? match[1].length : null;
        }

        function isKnownRoute(path) {
          return legacyRoutes.some(function (route) {
            return route === path || (route.indexOf(':') !== -1 && routePattern(route).test(path));
          });
        }

        function recoverNestedPrefix(path) {
          var current = path;
          while (true) {
            var length = 0;
            legacyRoutes.forEach(function (prefix) {
              var next = routePrefixLength(current, prefix);
              if (next !== null && next > length) length = next;
            });
            if (!length) return null;
            current = normalizePath(current.slice(length));
            if (isKnownRoute(current)) return current;
          }
        }

        function normalizedLegacyPath(routeSource) {
          var queryIndex = routeSource.indexOf('?');
          var rawPath = queryIndex >= 0 ? routeSource.slice(0, queryIndex) : routeSource;
          var query = queryIndex >= 0 ? routeSource.slice(queryIndex) : '';
          var path = recoverNestedPrefix(normalizePath(rawPath)) || normalizePath(rawPath);
          var hasAuth = !!window.localStorage.getItem('authorization');

          if (!isKnownRoute(path)) {
            path = hasAuth ? '/dashboard' : '/login';
          } else if (hasAuth && legacyPublicRoutes.indexOf(path) !== -1) {
            path = '/dashboard';
          } else if (!hasAuth && legacyPublicRoutes.indexOf(path) === -1) {
            path = '/login';
          }

          return path + query;
        }

        function normalizeBootUrl(url) {
          var rawHash = url.hash.indexOf('#') === 0 ? url.hash.slice(1) : '';
          var routeSource = rawHash || url.pathname;
          var nextHash = '#' + normalizedLegacyPath(routeSource);
          var changed = url.pathname !== '/' || url.hash !== nextHash;
          url.pathname = '/';
          url.hash = nextHash;
          return changed;
        }

        var bootUrl = new URL(window.location.href);
        if (normalizeBootUrl(bootUrl)) {
          window.history.replaceState(window.history.state, '', bootUrl.toString());
        }

        function textOf(value, seen) {
          if (value === null || value === undefined) return '';
          if (typeof value !== 'object') return String(value);
          if (seen.indexOf(value) !== -1) return '';
          seen.push(value);

          var record = value;
          var fields = [
            'message',
            'filename',
            'name',
            'type',
            'reason',
            'error',
            'detail',
            'data',
            'payload',
          ];
          var text = fields
            .map(function (field) {
              return textOf(record[field], seen);
            })
            .join('\n');
          var target = record.target || record.srcElement;
          if (target) {
            text +=
              '\n' +
              [target.src, target.currentSrc, target.href, target.tagName, target.type]
                .filter(Boolean)
                .join('\n');
          }
          return text;
        }

        function staleViteModule(value) {
          var text = textOf(value, []).toLowerCase();
          return (
            text.indexOf('outdated optimize dep') !== -1 ||
            text.indexOf('failed to fetch dynamically imported module') !== -1 ||
            text.indexOf('failed to load module script') !== -1 ||
            text.indexOf('importing a module script failed') !== -1 ||
            text.indexOf('chunkloaderror') !== -1 ||
            text.indexOf('loading chunk') !== -1 ||
            (text.indexOf('requested module') !== -1 &&
              (text.indexOf('does not provide an export') !== -1 ||
                text.indexOf("doesn't provide an export") !== -1)) ||
            (text.indexOf('/node_modules/.vite/') !== -1 &&
              (text.indexOf('does not provide an export named') !== -1 ||
                text.indexOf('mime type') !== -1 ||
                text.indexOf('module script') !== -1 ||
                text.indexOf('net::err_aborted') !== -1))
          );
        }

        function stableKey(url) {
          var search = new URLSearchParams(url.search);
          search.delete('__v2board_entry_recover');
          search.delete('__v2board_recover');
          search.delete('__v2board_dev_recover');
          var query = search.toString();
          return url.pathname + (query ? '?' + query : '') + url.hash;
        }

        function recoveryKey(url) {
          return storageKey + ':' + stableKey(url);
        }

        function elementEmpty(element) {
          return (
            !element ||
            (!element.textContent.trim() &&
              !element.querySelector(
                'a,button,input,select,textarea,img,svg,canvas,iframe,video,[role],[aria-label],.fa,.si,.ant-spin,[class*="loading"],[class*="spinner"]',
              ))
          );
        }

        function legacyMainEmpty(root) {
          if (!root || !root.querySelector('#page-container')) return false;
          var main =
            root.querySelector('#main-container .content') || root.querySelector('#main-container');
          return !!main && elementEmpty(main);
        }

        function appEmpty() {
          var root = document.getElementById('root');
          return elementEmpty(root) || legacyMainEmpty(root);
        }

        function renderFallback() {
          var root = document.getElementById('root');
          if (!root) return;
          var target =
            root.querySelector('#main-container .content') ||
            root.querySelector('#main-container') ||
            root;
          target.innerHTML = [
            '<div class="block block-rounded" data-v2board-white-screen-fallback="1">',
            '<div class="block-content text-center py-5">',
            '<h3 class="font-w400 text-danger mb-2">页面加载失败</h3>',
            '<p class="text-muted mb-4">请刷新页面后重试。</p>',
            '<button type="button" class="btn btn-primary" onclick="window.location.reload()">刷新页面</button>',
            '</div>',
            '</div>',
          ].join('');
        }

        function recover(event) {
          if (event && typeof event.preventDefault === 'function') event.preventDefault();
          var current = new URL(window.location.href);
          var key = recoveryKey(current);
          var attempts = Number(window.sessionStorage.getItem(key) || '0');
          if (attempts >= maxAttempts) {
            renderFallback();
            return;
          }
          window.sessionStorage.setItem(key, String(attempts + 1));
          normalizeBootUrl(current);
          current.searchParams.set('__v2board_entry_recover', String(Date.now()));
          window.location.replace(current.toString());
        }

        function recoverStaleModule(event) {
          if (staleViteModule(event)) recover(event);
        }

        function routeMismatchWarning(value) {
          var text = textOf(value, []).toLowerCase();
          return (
            text.indexOf('no routes matched location') !== -1 ||
            text.indexOf('matched location "/login/') !== -1
          );
        }

        function patchConsoleRecovery(method) {
          var original = window.console && window.console[method];
          if (typeof original !== 'function') return;
          window.console[method] = function () {
            for (var index = 0; index < arguments.length; index += 1) {
              if (routeMismatchWarning(arguments[index])) {
                window.setTimeout(function () {
                  recover();
                }, 0);
                break;
              }
            }
            return original.apply(this, arguments);
          };
        }

        function checkEmptyRoot() {
          if (appEmpty()) recover();
        }

        function clearRenderedAttempt() {
          if (!appEmpty()) {
            window.sessionStorage.removeItem(recoveryKey(new URL(window.location.href)));
          }
        }

        function schedule() {
          window.clearTimeout(timer);
          timer = window.setTimeout(checkEmptyRoot, delay);
          window.setTimeout(clearRenderedAttempt, clearDelay);
        }

        window.addEventListener('vite:preloadError', recoverStaleModule);
        window.addEventListener('error', recoverStaleModule, true);
        window.addEventListener('unhandledrejection', recoverStaleModule);
        patchConsoleRecovery('error');
        patchConsoleRecovery('warn');
        window.addEventListener('hashchange', schedule);
        window.addEventListener('popstate', schedule);
        document.addEventListener('DOMContentLoaded', schedule);
        window.addEventListener('load', schedule);
        if (typeof MutationObserver !== 'undefined') {
          var observerTarget = document.getElementById('root');
          if (observerTarget) {
            new MutationObserver(schedule).observe(observerTarget, {
              childList: true,
              subtree: true,
            });
          }
        }
        schedule();
      })();
    </script>
    <script src="/theme/default/assets/vendors.async.js"></script>
    <script src="/theme/default/assets/components.async.js"></script>
    <script type="module" src="/src/main.tsx?v=20260606-white-screen-recovery-30"></script>
  </body>
</html>
