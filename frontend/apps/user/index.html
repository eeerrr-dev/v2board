<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="V2Board" />
    <meta name="theme-color" content="#0665d0" />
    <title>V2Board</title>
    <script>
      (function () {
        var mode = document.cookie.split('; ').reduce(function (value, item) {
          var separator = item.indexOf('=');
          if (separator === -1 || item.slice(0, separator) !== 'dark_mode') return value;
          try {
            return decodeURIComponent(item.slice(separator + 1));
          } catch (error) {
            return '';
          }
        }, '');
        var dark =
          mode === '1' ||
          ((mode === '' || mode === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <script id="v2board-runtime-config" type="application/json">__V2BOARD_RUNTIME_CONFIG__</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
