[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
]
all-features = true

[advisories]
unmaintained = "all"
unsound = "all"
yanked = "deny"
ignore = [
  # `paste` is archived upstream but is a compile-time proc-macro only, pulled
  # in transitively by clickhouse (latest) -> polonius-the-crab ->
  # higher-kinded-types; no maintained replacement path exists today. Keep in
  # lockstep with .cargo/audit.toml.
  { id = "RUSTSEC-2024-0436", reason = "compile-time proc-macro reached only through the latest clickhouse driver; no upstream fix available" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[licenses]
confidence-threshold = 0.93
allow = [
  "0BSD",
  "Apache-2.0",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
