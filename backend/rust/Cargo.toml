[workspace]
members = [
  "crates/api",
  "crates/compat",
  "crates/config",
  "crates/contract",
  "crates/db",
  "crates/domain",
  "crates/workers",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/v2board/v2board"
rust-version = "1.96.1"

[workspace.dependencies]
anyhow = "1"
apalis = "0.7.4"
apalis-cron = "0.7.4"
apalis-redis = "0.7.4"
argon2 = "0.5"
async-trait = "0.1"
axum = { version = "0.8", features = ["macros"] }
bcrypt = "0.19"
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
hex = "0.4"
hmac = "0.13"
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
lettre = { version = "0.11.22", default-features = false, features = ["builder", "smtp-transport", "tokio1-rustls", "rustls-platform-verifier", "ring"] }
md5 = "0.8"
openssl = "0.10.81"
redis = { version = "1", features = ["tokio-comp"] }
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls"] }
rmp-serde = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_urlencoded = "0.7"
sha1 = "0.11"
sha2 = "0.11"
sqlx = { version = "0.9", features = ["runtime-tokio", "tls-rustls", "mysql", "json", "chrono"] }
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
tower-http = { version = "0.7", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1", features = ["v4"] }
