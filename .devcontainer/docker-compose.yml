# Editor-only dev container — a SEPARATE compose project from the `make` workflow
# (docker-compose.local.yml), so it never collides with `make sync` / `make up`
# (those only act on the `v2board` project's volumes).
#
# The repo is bind-mounted read-write for editing; every node_modules path and the
# pnpm store live in named volumes that shadow those paths, so the host working
# tree never gains node_modules / .pnpm-store (AGENTS.md: no host build artifacts).
services:
  dev:
    image: mcr.microsoft.com/devcontainers/typescript-node:22-bookworm
    command: sleep infinity
    working_dir: /workspaces/v2board/frontend
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    volumes:
      - ..:/workspaces/v2board:cached
      # node_modules at every workspace location (root + 2 apps + 5 packages) and
      # the pnpm store, all in volumes so they stay off the host tree:
      - dev-frontend-node_modules:/workspaces/v2board/frontend/node_modules
      - dev-user-node_modules:/workspaces/v2board/frontend/apps/user/node_modules
      - dev-admin-node_modules:/workspaces/v2board/frontend/apps/admin/node_modules
      - dev-api-client-node_modules:/workspaces/v2board/frontend/packages/api-client/node_modules
      - dev-config-node_modules:/workspaces/v2board/frontend/packages/config/node_modules
      - dev-i18n-node_modules:/workspaces/v2board/frontend/packages/i18n/node_modules
      - dev-tokens-node_modules:/workspaces/v2board/frontend/packages/tokens/node_modules
      - dev-types-node_modules:/workspaces/v2board/frontend/packages/types/node_modules
      # pnpm co-locates its content store on the project's drive root (the bind-mount
      # root = /workspaces/v2board), ignoring store-dir when it sits on another
      # device. Mount a volume at exactly that path so the store stays off the host.
      - dev-pnpm-store:/workspaces/v2board/.pnpm-store

volumes:
  dev-frontend-node_modules:
  dev-user-node_modules:
  dev-admin-node_modules:
  dev-api-client-node_modules:
  dev-config-node_modules:
  dev-i18n-node_modules:
  dev-tokens-node_modules:
  dev-types-node_modules:
  dev-pnpm-store:
