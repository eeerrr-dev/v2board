version: 2
updates:
  - package-ecosystem: cargo
    directory: /backend/rust
    schedule:
      interval: weekly
    groups:
      rust:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      containers:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']
