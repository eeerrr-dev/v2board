name: Native CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/rust/**'
      - 'frontend/**'
      - 'Dockerfile.rust'
      - 'Dockerfile.frontend'
      - '.dockerignore'
      - '.gitattributes'
      - '.devcontainer/**'
      - 'docker-compose.local.yml'
      - 'Makefile'
      - 'deploy/**'
      - 'docs/**'
      - '.gitmodules'
      - 'references/**'
      - '.github/**'
  pull_request:
    paths:
      - 'backend/rust/**'
      - 'frontend/**'
      - 'Dockerfile.rust'
      - 'Dockerfile.frontend'
      - '.dockerignore'
      - '.gitattributes'
      - '.devcontainer/**'
      - 'docker-compose.local.yml'
      - 'Makefile'
      - 'deploy/**'
      - 'docs/**'
      - '.gitmodules'
      - 'references/**'
      - '.github/**'

permissions:
  contents: read

concurrency:
  group: native-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust fmt, clippy, test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_BUILD_WARNINGS: deny
    defaults:
      run:
        working-directory: backend/rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt,llvm-tools
          rustup default 1.97.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend/rust

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test with coverage
        run: |
          cargo install cargo-llvm-cov --version 0.8.7 --locked
          cargo llvm-cov --workspace --locked --lcov --output-path coverage.lcov
          cargo llvm-cov report --summary-only | tee coverage-summary.txt

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rust-coverage
          path: |
            backend/rust/coverage.lcov
            backend/rust/coverage-summary.txt
          if-no-files-found: error
          retention-days: 30

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --deny warnings

      - name: Enforce Rust dependency sources, licenses, and bans
        run: |
          cargo install cargo-deny --version 0.19.9 --locked
          cargo deny --locked check advisories bans licenses sources

      - name: Reject unused Rust dependencies
        run: |
          cargo install cargo-machete --version 0.9.2 --locked
          cargo machete

      - name: Reference route contract
        env:
          ROUTE_AUDIT_ADMIN_PATH: admin
          ROUTE_AUDIT_REFERENCE_ROOT: ../../references/wyx2685-v2board
          ROUTE_AUDIT_RUST_ROOT: .
        run: cargo run --locked -p v2board-contract -- route-audit

  frontend:
    name: Frontend lint, typecheck, test, release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit modern frontend source isolation
        run: pnpm audit:source

      - name: Reject unused files, exports, and dependencies
        run: pnpm audit:deps

      - name: Audit dependencies and registry signatures
        run: |
          pnpm audit --audit-level=low --lockfile-only
          pnpm audit signatures

      - name: Assert lockfile is deduplicated
        run: pnpm dedupe --check

      - name: Assert shared shadcn primitives stay synchronized
        run: node scripts/ui-sync-audit.mjs

      - name: Audit route, interaction, and viewport coverage
        run: node scripts/parity-config-audit.mjs

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build immutable deploy release
        run: pnpm build:deploy

  integration:
    name: Migrations, workers, deploy, browser behavior
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install ripgrep for the Makefile audit targets
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ripgrep

      - name: Start the native-runtime-shaped test stack and apply real migrations
        run: make deploy-smoke

      - name: Assert API/worker/analytics dependency graphs exclude lifecycle, provision, and MySQL
        run: make native-database-audit

      - name: Verify production invariants against disposable PostgreSQL, ClickHouse, and Redis state
        run: make rust-integration

      - name: Reconcile scheduled worker side effects against PostgreSQL and Redis
        run: make rust-worker-reconcile

      - name: Run desktop and mobile interaction plus accessibility contracts
        env:
          PARITY_WORKERS: '4'
        run: make interaction-parity

      - name: Assert the Docker-driven gates left the host build/deploy targets empty
        run: make public-bundle-audit

      - name: Print container logs after an integration failure
        if: failure()
        run: docker compose -p v2board -f docker-compose.local.yml logs --no-color --tail=300

      - name: Stop integration containers
        if: always()
        run: make down

  native-release:
    name: Native Debian 13 amd64 release
    needs: [integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ripgrep for the Makefile audit targets
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ripgrep

      - name: Assert retired runtimes stay isolated
        run: make runtime-isolation-audit

      # The release builds run on a docker-container builder so BuildKit can
      # read and write the GitHub Actions layer cache across CI runs.
      # `install` aliases plain `docker build` to that builder — without it the
      # default docker driver answers and rejects the gha cache export.
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          install: true

      - uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.1.0

      - name: Audit the native release contract
        run: |
          make native-release-audit NATIVE_RELEASE_AUDIT_BUILD_FLAGS="\
            --cache-from type=gha,scope=native-release-audit \
            --cache-to type=gha,scope=native-release-audit,mode=max"

      - name: Export and verify the disposable lifecycle tool
        run: |
          docker build \
            --platform linux/amd64 \
            --target lifecycle-runtime-audit \
            --tag v2board-lifecycle-runtime-audit:debian-13-amd64 \
            --load \
            --cache-from type=gha,scope=lifecycle-audit \
            --cache-to type=gha,scope=lifecycle-audit,mode=max \
            --file Dockerfile.rust .
          docker build \
            --platform linux/amd64 \
            --target lifecycle-tool \
            --output type=local,dest=lifecycle-tool \
            --cache-from type=gha,scope=lifecycle-tool \
            --cache-to type=gha,scope=lifecycle-tool,mode=max \
            --file Dockerfile.rust .
          test -x lifecycle-tool/v2board-lifecycle
          test "$(find lifecycle-tool -maxdepth 1 -type f | wc -l)" -eq 1
          file lifecycle-tool/v2board-lifecycle | grep -Eq 'ELF 64-bit LSB.*x86-64'
          install -d lifecycle-package
          install -m 0755 lifecycle-tool/v2board-lifecycle lifecycle-package/v2board-lifecycle
          printf '%s\n' \
            'format=v2board-lifecycle-tool-v1' \
            "source_revision=${GITHUB_SHA}" \
            'target_os=linux' \
            'target_distribution=debian' \
            'target_distribution_version=13' \
            'target_arch=amd64' > lifecycle-package/RELEASE
          (cd lifecycle-package && sha256sum RELEASE v2board-lifecycle > SHA256SUMS)
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 --numeric-owner \
            -C lifecycle-package -czf v2board-lifecycle-debian-13-amd64.tar.gz .
          sha256sum v2board-lifecycle-debian-13-amd64.tar.gz \
            > v2board-lifecycle-debian-13-amd64.tar.gz.sha256

      - name: Export the bare-metal release filesystem
        run: |
          docker build \
            --platform linux/amd64 \
            --target native-release \
            --build-arg V2BOARD_SOURCE_REVISION="${GITHUB_SHA}" \
            --output type=local,dest=native-release \
            --cache-from type=gha,scope=native-release \
            --cache-to type=gha,scope=native-release,mode=max \
            --file Dockerfile.rust .

      - name: Verify Debian 13 release layout and checksums
        run: |
          test -x native-release/bin/v2board-api
          test -x native-release/bin/v2board-workers
          test -x native-release/bin/v2board-analytics-schema
          test "$(find native-release/bin -maxdepth 1 -type f | wc -l)" -eq 3
          test -L native-release/frontend/current
          test -L native-release/frontend/previous
          # A clean build has no historical generation. Both links intentionally
          # name the same immutable content ID; this is not cross-instance retention.
          test "$(readlink native-release/frontend/previous)" = \
            "$(readlink native-release/frontend/current)"
          test -f native-release/frontend/current/user/index.html
          test -f native-release/frontend/current/admin/index.html
          test -f native-release/systemd/v2board-api.service
          test -f native-release/systemd/v2board-worker.service
          test -f native-release/systemd/v2board-cloudflared.service
          test "$(find native-release/systemd -mindepth 1 -maxdepth 1 | wc -l)" -eq 3
          grep -Fxq 'format=v2board-native-release-v1' native-release/RELEASE
          workspace_version="$(sed -n 's/^version = "\([0-9][0-9a-zA-Z.+-]*\)"$/\1/p' backend/rust/Cargo.toml | head -n 1)"
          test -n "${workspace_version}"
          grep -Fxq "version=${workspace_version}" native-release/RELEASE
          grep -Fxq "source_revision=${GITHUB_SHA}" native-release/RELEASE
          grep -Fxq 'target_os=linux' native-release/RELEASE
          grep -Fxq 'target_distribution=debian' native-release/RELEASE
          grep -Fxq 'target_distribution_version=13' native-release/RELEASE
          grep -Fxq 'target_arch=amd64' native-release/RELEASE
          test "$(wc -l < native-release/RELEASE)" -eq 7
          (cd native-release && sha256sum --check SHA256SUMS)
          retired_bundle="$(find native-release/frontend -type f \( \
            -name "u""mi.js" -o -name "u""mi.css" -o \
            -name "components"".chunk.css" -o -name "vendors"".async.js" -o \
            -name "components"".async.js" \
          \) -print -quit)"
          if [ -n "${retired_bundle}" ]; then
            echo "Retired packaged frontend bundle found: ${retired_bundle}"
            exit 1
          fi

      - name: Pack the native release
        run: |
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 --numeric-owner \
            -C native-release -czf v2board-native-debian-13-amd64.tar.gz .
          sha256sum v2board-native-debian-13-amd64.tar.gz > v2board-native-debian-13-amd64.tar.gz.sha256

      - name: Admit the real release archive through the lifecycle inspector
        run: |
          archive_sha256="$(sha256sum v2board-native-debian-13-amd64.tar.gz | cut -d ' ' -f 1)"
          audit_archive="${RUNNER_TEMP}/v2board-native-release-inspection.tar.gz"
          sudo install -o root -g root -m 0400 \
            v2board-native-debian-13-amd64.tar.gz "${audit_archive}"
          inspection="$(docker run --rm --platform linux/amd64 \
            --volume "${audit_archive}:/audit/release.tar.gz:ro" \
            v2board-lifecycle-runtime-audit:debian-13-amd64 \
            /out/v2board-lifecycle inspect-release-archive \
              --archive /audit/release.tar.gz \
              --release-id "ci-${GITHUB_SHA}" \
              --sha256 "${archive_sha256}")"
          jq -e \
            --arg release_id "ci-${GITHUB_SHA}" \
            --arg archive_sha256 "${archive_sha256}" \
            '.release_id == $release_id and
             .archive_sha256 == $archive_sha256 and
             .complete_structure_verified == true and
             .internal_sha256sums_verified == true and
             .systemd_contract_verified == true and
             .target_filesystem_unchanged == true' <<<"${inspection}"

      - name: Remove the root-owned release-inspection copy
        if: always()
        run: sudo rm -f "${RUNNER_TEMP}/v2board-native-release-inspection.tar.gz"

      - name: Upload the native release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: v2board-native-debian-13-amd64
          path: |
            v2board-native-debian-13-amd64.tar.gz
            v2board-native-debian-13-amd64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload the disposable lifecycle tool
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: v2board-lifecycle-debian-13-amd64
          path: |
            v2board-lifecycle-debian-13-amd64.tar.gz
            v2board-lifecycle-debian-13-amd64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  native-attest:
    name: Attest native Debian 13 amd64 release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [native-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download the native release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v2board-native-debian-13-amd64

      - name: Download the disposable lifecycle tool
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v2board-lifecycle-debian-13-amd64

      - name: Verify downloaded release archives
        run: |
          sha256sum --check v2board-native-debian-13-amd64.tar.gz.sha256
          sha256sum --check v2board-lifecycle-debian-13-amd64.tar.gz.sha256

      - name: Attest the production release archives
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            v2board-native-debian-13-amd64.tar.gz
            v2board-lifecycle-debian-13-amd64.tar.gz
