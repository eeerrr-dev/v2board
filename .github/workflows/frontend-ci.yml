name: Frontend CI

# Enforces the frontend gate on every push to main and every PR that touches
# the frontend. The headline check is `pnpm lint`, which runs the type-aware
# @typescript-eslint/no-deprecated rule (eslint . --max-warnings 0), so a NEW
# deprecation in apps/*/src or packages/*/src fails the build. Typecheck, test,
# and build run the repo's own canonical scripts.
#
# CI runs on ephemeral GitHub runners, so pnpm installs deps there directly;
# that never touches the host working tree, consistent with the Docker-only
# LOCAL workflow in AGENTS.md.
#
# Actions are pinned to a commit SHA (human-readable version in the trailing
# comment) and kept current by .github/dependabot.yml.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

# Least privilege: this gate only needs to read the repository.
permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Reads the pinned pnpm version from frontend/package.json's
      # packageManager field, so CI never drifts from local.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json

      # Node version comes from frontend/.nvmrc (single source of truth,
      # matched by the node:22 base image in Dockerfile.frontend).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (incl. no-deprecated gate)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
