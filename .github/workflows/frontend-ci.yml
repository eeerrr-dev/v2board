name: Frontend CI

# Enforces the frontend gate on every push to main and every PR that touches
# the frontend. The headline check is `pnpm lint`, which runs the type-aware
# @typescript-eslint/no-deprecated rule (eslint . --max-warnings 0) so a NEW
# deprecation in apps/*/src or packages/*/src fails the build.
#
# CI runs on ephemeral GitHub runners, so pnpm installs deps there directly.
# That does not touch the host working tree, so it is consistent with the
# Docker-only LOCAL workflow in AGENTS.md.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned pnpm version from frontend/package.json's
      # packageManager field, so CI never drifts from local.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Primary gate: the deprecation guard lives here.
      - name: Lint
        run: pnpm lint

      - name: Typecheck (user)
        run: pnpm --filter @v2board/user typecheck

      - name: Typecheck (admin)
        run: pnpm --filter @v2board/admin typecheck

      - name: Test (user)
        run: pnpm --filter @v2board/user exec vitest run

      - name: Test (admin)
        run: pnpm --filter @v2board/admin exec vitest run
