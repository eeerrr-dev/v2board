# blackbox-exporter module for the external-path uptime probe
# (prometheus.yml job v2board-public). Install as /etc/prometheus/blackbox.yml
# (Debian package prometheus-blackbox-exporter reads it from there).

modules:
  https_2xx:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      fail_if_not_ssl: true
      follow_redirects: true
      valid_status_codes: []  # default: any 2xx
