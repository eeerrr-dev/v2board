# Canonical local workflow: native Rust API/workers plus the source React apps.
# Dependency, cache, build, deploy, and runtime output stays in Docker volumes.

x-local-logging: &local-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

x-rust-common-environment: &rust-common-environment
  APP_KEY: ${APP_KEY:-local-rust-dev-key}
  APP_URL: ${APP_URL:-http://localhost:8000}
  REDIS_URL: ${V2BOARD_LOCAL_REDIS_URL:-redis://redis:6379/1}
  RUST_BIND_ADDR: 0.0.0.0:8080
  V2BOARD_FRONTEND_ADMIN_PATH: ${V2BOARD_FRONTEND_ADMIN_PATH:-admin-dev}
  V2BOARD_FRONTEND_DIR: /app/frontend-deploy
  V2BOARD_DATABASE_MIN_CONNECTIONS: ${V2BOARD_DATABASE_MIN_CONNECTIONS:-1}
  V2BOARD_DATABASE_MAX_CONNECTIONS: ${V2BOARD_DATABASE_MAX_CONNECTIONS:-20}
  V2BOARD_DATABASE_ACQUIRE_TIMEOUT_SECONDS: ${V2BOARD_DATABASE_ACQUIRE_TIMEOUT_SECONDS:-10}
  V2BOARD_DATABASE_IDLE_TIMEOUT_SECONDS: ${V2BOARD_DATABASE_IDLE_TIMEOUT_SECONDS:-600}
  V2BOARD_DATABASE_MAX_LIFETIME_SECONDS: ${V2BOARD_DATABASE_MAX_LIFETIME_SECONDS:-1800}
  V2BOARD_AUTH_SESSION_TTL_SECONDS: ${V2BOARD_AUTH_SESSION_TTL_SECONDS:-2592000}
  V2BOARD_ENV: local
  V2BOARD_RUNTIME_ROOT: /var/lib/v2board
  V2BOARD_SEED_LOCAL: ${V2BOARD_SEED_LOCAL:-1}

x-rust-api-environment: &rust-api-environment
  <<: *rust-common-environment
  DATABASE_URL: ${V2BOARD_LOCAL_API_DATABASE_URL:-postgresql://v2board:v2board@postgres:5432/v2board}
  V2BOARD_PEER_DATABASE_PRINCIPAL: v2board_worker

x-rust-worker-environment: &rust-worker-environment
  <<: *rust-common-environment
  DATABASE_URL: ${V2BOARD_LOCAL_WORKER_DATABASE_URL:-postgresql://v2board:v2board@postgres:5432/v2board}
  V2BOARD_PEER_DATABASE_PRINCIPAL: v2board_api
  V2BOARD_CLICKHOUSE_URL: http://clickhouse:8123
  V2BOARD_CLICKHOUSE_DATABASE: ${V2BOARD_LOCAL_CLICKHOUSE_DATABASE:-v2board_analytics}
  V2BOARD_CLICKHOUSE_WRITER_USERNAME: v2board_analytics
  V2BOARD_CLICKHOUSE_WRITER_PASSWORD: v2board

x-rust-volumes: &rust-volumes
  - ./backend/rust:/src/backend/rust:ro
  - ./docs:/src/docs:ro
  - ./deploy/systemd:/src/deploy/systemd:ro
  - rust-cargo-registry:/usr/local/cargo/registry
  - rust-cargo-git:/usr/local/cargo/git
  - rust-target:/app/target
  - v2board-runtime:/var/lib/v2board

x-frontend-volumes: &frontend-volumes
  - ./frontend:/src/frontend:ro
  - frontend-workspace:/app/frontend
  - frontend-deploy:/app/frontend-deploy
  - frontend-interaction-artifacts:/app/frontend/.cache/interaction-parity
  - frontend-node_modules:/app/frontend/node_modules
  - frontend-pnpm-store:/app/frontend/.pnpm-store
  - frontend-playwright-cache:/app/frontend/.cache/ms-playwright
  - frontend-admin-node_modules:/app/frontend/apps/admin/node_modules
  - frontend-user-node_modules:/app/frontend/apps/user/node_modules
  - frontend-api-client-node_modules:/app/frontend/packages/api-client/node_modules
  - frontend-config-node_modules:/app/frontend/packages/config/node_modules
  - frontend-i18n-node_modules:/app/frontend/packages/i18n/node_modules
  - frontend-types-node_modules:/app/frontend/packages/types/node_modules

x-frontend-dev-volumes: &frontend-dev-volumes
  - ./frontend:/src/frontend:ro
  - frontend-workspace:/app/frontend
  - frontend-deploy:/app/frontend-deploy:ro
  - frontend-interaction-artifacts:/app/frontend/.cache/interaction-parity
  - frontend-node_modules:/app/frontend/node_modules
  - frontend-pnpm-store:/app/frontend/.pnpm-store
  - frontend-playwright-cache:/app/frontend/.cache/ms-playwright
  - frontend-admin-node_modules:/app/frontend/apps/admin/node_modules
  - frontend-user-node_modules:/app/frontend/apps/user/node_modules
  - frontend-api-client-node_modules:/app/frontend/packages/api-client/node_modules
  - frontend-config-node_modules:/app/frontend/packages/config/node_modules
  - frontend-i18n-node_modules:/app/frontend/packages/i18n/node_modules
  - frontend-types-node_modules:/app/frontend/packages/types/node_modules

x-reference-frontend-volumes: &reference-frontend-volumes
  - ./frontend:/src/frontend:ro
  - ./references/wyx2685-v2board:/reference:ro
  - frontend-workspace:/app/frontend
  - frontend-interaction-artifacts:/app/frontend/.cache/interaction-parity
  - frontend-node_modules:/app/frontend/node_modules
  - frontend-pnpm-store:/app/frontend/.pnpm-store
  - frontend-playwright-cache:/app/frontend/.cache/ms-playwright
  - frontend-admin-node_modules:/app/frontend/apps/admin/node_modules
  - frontend-user-node_modules:/app/frontend/apps/user/node_modules
  - frontend-api-client-node_modules:/app/frontend/packages/api-client/node_modules
  - frontend-config-node_modules:/app/frontend/packages/config/node_modules
  - frontend-i18n-node_modules:/app/frontend/packages/i18n/node_modules
  - frontend-types-node_modules:/app/frontend/packages/types/node_modules

services:
  frontend-build:
    logging: *local-logging
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: v2board-frontend-dev
    working_dir: /app/frontend
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        if [ ! -f /app/frontend/package.json ]; then
          tar \
            --exclude=node_modules \
            --exclude=.pnpm-store \
            --exclude=dist \
            --exclude=dist-deploy \
            -C /src/frontend -cf - . | tar -C /app/frontend -xf -
        fi
        pnpm config set store-dir /app/frontend/.pnpm-store
        pnpm install --frozen-lockfile
        pnpm build:deploy
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=4096}
      PLAYWRIGHT_BROWSERS_PATH: /app/frontend/.cache/ms-playwright
      V2BOARD_DEPLOY_ROOT: /app/frontend-deploy
    volumes: *frontend-volumes
    restart: "no"

  rust-migrate:
    logging: *local-logging
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-api -- migrate
    environment: *rust-api-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes: *rust-volumes

  clickhouse-migrate:
    logging: *local-logging
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-analytics --bin v2board-analytics-schema
    environment:
      V2BOARD_ENV: local
      V2BOARD_CLICKHOUSE_SCHEMA_URL: http://clickhouse:8123
      V2BOARD_CLICKHOUSE_SCHEMA_DATABASE: ${V2BOARD_LOCAL_CLICKHOUSE_DATABASE:-v2board_analytics}
      V2BOARD_CLICKHOUSE_SCHEMA_USERNAME: v2board_analytics
      V2BOARD_CLICKHOUSE_SCHEMA_PASSWORD: v2board
      V2BOARD_CLICKHOUSE_BIND_POSTGRES_URL: postgresql://v2board:v2board@postgres:5432/v2board
      V2BOARD_CLICKHOUSE_RAW_RETENTION_DAYS: "90"
      V2BOARD_CLICKHOUSE_AGGREGATE_RETENTION_DAYS: "730"
    depends_on:
      clickhouse:
        condition: service_healthy
      rust-migrate:
        condition: service_completed_successfully
    restart: "no"
    volumes: *rust-volumes

  rust-api:
    logging: *local-logging
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-api
    environment:
      <<: *rust-api-environment
      RUST_LOG: ${RUST_LOG:-v2board_api=info,tower_http=info}
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rust-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      start_period: 180s
      retries: 24
    ports:
      - "${RUST_API_PORT:-8000}:8080"
    volumes:
      - ./backend/rust:/src/backend/rust:ro
      - ./docs:/src/docs:ro
      - ./deploy/systemd:/src/deploy/systemd:ro
      - rust-cargo-registry:/usr/local/cargo/registry
      - rust-cargo-git:/usr/local/cargo/git
      - rust-target:/app/target
      - v2board-runtime:/var/lib/v2board
      - frontend-deploy:/app/frontend-deploy:ro

  rust-worker:
    logging: *local-logging
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-workers
    environment:
      <<: *rust-worker-environment
      RUST_LOG: ${RUST_WORKER_LOG:-v2board_workers=info}
      V2BOARD_WORKER_HEALTH_FILE: /tmp/v2board-worker-health
      V2BOARD_WORKER_HEALTH_MAX_AGE_SECONDS: "30"
    depends_on:
      rust-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          last=$$(cat "$${V2BOARD_WORKER_HEALTH_FILE}") &&
          now=$$(date +%s) && age=$$((now - last)) &&
          test "$$age" -ge 0 &&
          test "$$age" -le "$${V2BOARD_WORKER_HEALTH_MAX_AGE_SECONDS}"
      interval: 10s
      timeout: 3s
      start_period: 180s
      retries: 6
    volumes: *rust-volumes

  frontend:
    logging: *local-logging
    image: v2board-frontend-dev
    init: true
    working_dir: /app/frontend
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        pnpm config set store-dir /app/frontend/.pnpm-store
        pnpm install --frozen-lockfile
        exec pnpm --filter @v2board/user --filter @v2board/admin --parallel run dev
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      PLAYWRIGHT_BROWSERS_PATH: /app/frontend/.cache/ms-playwright
      VITE_API_BASE: http://rust-api:8080
      VITE_DEV_ADMIN_PATH: ${V2BOARD_FRONTEND_ADMIN_PATH:-admin-dev}
    depends_on:
      rust-api:
        condition: service_healthy
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes: *frontend-dev-volumes

  reference-oracle:
    logging: *local-logging
    profiles: ["reference"]
    image: v2board-frontend-dev
    init: true
    working_dir: /app/frontend
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        test -f /reference/public/theme/default/dashboard.blade.php
        exec node scripts/serve-oracle.mjs
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /app/frontend/.cache/ms-playwright
      REFERENCE_ORACLE_ROOT: /reference
      REFERENCE_ORACLE_STATE_ROOT: /tmp/v2board-reference-oracle
      VISUAL_PARITY_ADMIN_PATH: ${V2BOARD_FRONTEND_ADMIN_PATH:-admin-dev}
      VISUAL_PARITY_ORACLE_HOST: 0.0.0.0
      VISUAL_PARITY_ORACLE_PORT: "8001"
      VISUAL_PARITY_PUBLIC_ORACLE_HOST: localhost
      VISUAL_PARITY_SOURCE_BASE_URL: http://rust-api:8080
    depends_on:
      rust-api:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes: *reference-frontend-volumes

  # Test-only legacy MySQL source fixture. It models the already-stopped old
  # production source for direct source-to-new-target importer tests; it is not
  # part of any production migration or installation topology.
  legacy-mysql-source:
    profiles: ["migration-test"]
    logging: *local-logging
    image: mysql:8.4.10@sha256:c831a0f11348d402b43d77453e17d770be2eef356615a2823fe0f5a0d6c8b9af
    environment:
      MYSQL_DATABASE: v2board_legacy
      MYSQL_ROOT_PASSWORD: root-import-test-secret
    healthcheck:
      test: ["CMD-SHELL", "mysql --protocol=TCP -h 127.0.0.1 -ulegacy_reader -pLegacySourceReadOnlyTestSecret-32-bytes -D v2board_legacy -Nse 'SELECT 1 FROM v2_user LIMIT 1'"]
      interval: 2s
      timeout: 5s
      retries: 60
    restart: "no"
    tmpfs:
      - /var/lib/mysql
    volumes:
      - ./references/wyx2685-v2board/database/install.sql:/docker-entrypoint-initdb.d/001-install.sql:ro
      - ./backend/rust/crates/lifecycle/tests/fixtures/mysql-import-seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
      - ./backend/rust/crates/lifecycle/tests/fixtures/legacy-mysql-source-grants.sql:/docker-entrypoint-initdb.d/003-read-only-user.sql:ro

  # Test-only dedicated PostgreSQL 18 target for the full importer execute
  # path. It deliberately contains only the postgres maintenance database;
  # tmpfs and forced recreation make the production empty-cluster preflight
  # testable without touching the normal local database service.
  postgres-import-target:
    profiles: ["migration-test"]
    logging: *local-logging
    image: postgres:18.4-bookworm@sha256:d9c83446333daec3f0588cc709adb80c26090b7f9f0f7ec8d43c243385d79818
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: import_bootstrap
      POSTGRES_PASSWORD: ImportBootstrapTestSecret-32-bytes
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C.UTF-8 --data-checksums
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U import_bootstrap -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 60
    restart: "no"
    tmpfs:
      - /var/lib/postgresql

  # Test-only fresh Redis target for the full importer execute path. A tmpfs
  # keeps it whole-instance empty on every forced recreation without touching
  # the normal local Redis service or its development data.
  redis-import-target:
    profiles: ["migration-test"]
    logging: *local-logging
    image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    command:
      - sh
      - -ec
      - |
        cp /bootstrap/users.acl /data/users.acl
        exec redis-server --save '' --appendonly no --maxmemory-policy noeviction --aclfile /data/users.acl
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "import_bootstrap",
          "--pass",
          "RedisImportBootstrapTestSecret-32-bytes",
          "--no-auth-warning",
          "ping",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
    restart: "no"
    volumes:
      - ./backend/rust/crates/lifecycle/tests/fixtures/redis-import-target.acl:/bootstrap/users.acl:ro
    tmpfs:
      - /data

  postgres:
    logging: *local-logging
    image: postgres:18.4-bookworm@sha256:d9c83446333daec3f0588cc709adb80c26090b7f9f0f7ec8d43c243385d79818
    environment:
      POSTGRES_DB: v2board
      POSTGRES_USER: v2board
      POSTGRES_PASSWORD: v2board
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C.UTF-8 --data-checksums
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U v2board -d v2board"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18 deliberately mounts the parent so a future pg_upgrade
      # can keep versioned data directories side by side.
      - postgres-data:/var/lib/postgresql

  clickhouse:
    logging: *local-logging
    image: clickhouse/clickhouse-server:26.3.17.4@sha256:85c434814ac8905e5648027ce926f74ab067edd6aadbccb6c0c165cd3571ea49
    environment:
      CLICKHOUSE_DB: v2board_analytics
      CLICKHOUSE_USER: v2board_analytics
      CLICKHOUSE_PASSWORD: v2board
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - clickhouse-client --user v2board_analytics --password v2board --query 'SELECT 1'
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server

  redis:
    logging: *local-logging
    image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  mailpit:
    logging: *local-logging
    image: axllent/mailpit:v1.30.3@sha256:956d688cbd13dca36c72d8e94c34d6d1cdf4a005aa6aa4ff6edaaac56c34d8df
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  frontend-workspace:
  frontend-deploy:
  frontend-interaction-artifacts:
  frontend-node_modules:
  frontend-pnpm-store:
  frontend-playwright-cache:
  frontend-admin-node_modules:
  frontend-user-node_modules:
  frontend-api-client-node_modules:
  frontend-config-node_modules:
  frontend-i18n-node_modules:
  frontend-types-node_modules:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  redis-data:
  rust-cargo-registry:
  rust-cargo-git:
  rust-target:
  v2board-runtime:
