# Canonical local workflow: native Rust API/workers plus the source React apps.
# Dependency, cache, build, deploy, and runtime output stays in Docker volumes.

x-rust-environment: &rust-environment
  APP_KEY: ${APP_KEY:-local-rust-dev-key}
  APP_URL: ${APP_URL:-http://localhost:8000}
  DATABASE_URL: mysql://v2board:v2board@mysql:3306/v2board
  REDIS_URL: redis://redis:6379/1
  RUST_BIND_ADDR: 0.0.0.0:8080
  V2BOARD_FRONTEND_ADMIN_PATH: ${V2BOARD_FRONTEND_ADMIN_PATH:-admin}
  V2BOARD_FRONTEND_DIR: /app/frontend-deploy
  V2BOARD_DATABASE_MIN_CONNECTIONS: ${V2BOARD_DATABASE_MIN_CONNECTIONS:-1}
  V2BOARD_DATABASE_MAX_CONNECTIONS: ${V2BOARD_DATABASE_MAX_CONNECTIONS:-20}
  V2BOARD_DATABASE_ACQUIRE_TIMEOUT_SECONDS: ${V2BOARD_DATABASE_ACQUIRE_TIMEOUT_SECONDS:-10}
  V2BOARD_DATABASE_IDLE_TIMEOUT_SECONDS: ${V2BOARD_DATABASE_IDLE_TIMEOUT_SECONDS:-600}
  V2BOARD_DATABASE_MAX_LIFETIME_SECONDS: ${V2BOARD_DATABASE_MAX_LIFETIME_SECONDS:-1800}
  V2BOARD_AUTH_SESSION_TTL_SECONDS: ${V2BOARD_AUTH_SESSION_TTL_SECONDS:-2592000}
  V2BOARD_LEGACY_JWT_CUTOFF_UNIX: ${V2BOARD_LEGACY_JWT_CUTOFF_UNIX:-0}
  V2BOARD_ENV: local
  V2BOARD_RUNTIME_ROOT: /var/lib/v2board
  V2BOARD_SEED_LOCAL: ${V2BOARD_SEED_LOCAL:-1}

x-rust-volumes: &rust-volumes
  - ./backend/rust:/src/backend/rust:ro
  - rust-cargo-registry:/usr/local/cargo/registry
  - rust-cargo-git:/usr/local/cargo/git
  - rust-target:/app/target
  - v2board-runtime:/var/lib/v2board

x-frontend-volumes: &frontend-volumes
  - ./frontend:/src/frontend:ro
  - frontend-workspace:/app/frontend
  - frontend-deploy:/app/frontend-deploy
  - frontend-interaction-artifacts:/app/frontend/.cache/interaction-parity
  - frontend-node_modules:/app/frontend/node_modules
  - frontend-pnpm-store:/app/frontend/.pnpm-store
  - frontend-playwright-cache:/app/frontend/.cache/ms-playwright
  - frontend-admin-node_modules:/app/frontend/apps/admin/node_modules
  - frontend-user-node_modules:/app/frontend/apps/user/node_modules
  - frontend-api-client-node_modules:/app/frontend/packages/api-client/node_modules
  - frontend-config-node_modules:/app/frontend/packages/config/node_modules
  - frontend-i18n-node_modules:/app/frontend/packages/i18n/node_modules
  - frontend-types-node_modules:/app/frontend/packages/types/node_modules

x-frontend-dev-volumes: &frontend-dev-volumes
  - ./frontend:/src/frontend:ro
  - frontend-workspace:/app/frontend
  - frontend-deploy:/app/frontend-deploy:ro
  - frontend-interaction-artifacts:/app/frontend/.cache/interaction-parity
  - frontend-node_modules:/app/frontend/node_modules
  - frontend-pnpm-store:/app/frontend/.pnpm-store
  - frontend-playwright-cache:/app/frontend/.cache/ms-playwright
  - frontend-admin-node_modules:/app/frontend/apps/admin/node_modules
  - frontend-user-node_modules:/app/frontend/apps/user/node_modules
  - frontend-api-client-node_modules:/app/frontend/packages/api-client/node_modules
  - frontend-config-node_modules:/app/frontend/packages/config/node_modules
  - frontend-i18n-node_modules:/app/frontend/packages/i18n/node_modules
  - frontend-types-node_modules:/app/frontend/packages/types/node_modules

x-reference-frontend-volumes: &reference-frontend-volumes
  - ./frontend:/src/frontend:ro
  - ./references/wyx2685-v2board:/reference:ro
  - frontend-workspace:/app/frontend
  - frontend-interaction-artifacts:/app/frontend/.cache/interaction-parity
  - frontend-node_modules:/app/frontend/node_modules
  - frontend-pnpm-store:/app/frontend/.pnpm-store
  - frontend-playwright-cache:/app/frontend/.cache/ms-playwright
  - frontend-admin-node_modules:/app/frontend/apps/admin/node_modules
  - frontend-user-node_modules:/app/frontend/apps/user/node_modules
  - frontend-api-client-node_modules:/app/frontend/packages/api-client/node_modules
  - frontend-config-node_modules:/app/frontend/packages/config/node_modules
  - frontend-i18n-node_modules:/app/frontend/packages/i18n/node_modules
  - frontend-types-node_modules:/app/frontend/packages/types/node_modules

services:
  frontend-build:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: v2board-frontend-dev
    working_dir: /app/frontend
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        if [ ! -f /app/frontend/package.json ]; then
          tar \
            --exclude=node_modules \
            --exclude=.pnpm-store \
            --exclude=dist \
            --exclude=dist-deploy \
            -C /src/frontend -cf - . | tar -C /app/frontend -xf -
        fi
        pnpm config set store-dir /app/frontend/.pnpm-store
        pnpm install --frozen-lockfile
        pnpm build:deploy
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=4096}
      PLAYWRIGHT_BROWSERS_PATH: /app/frontend/.cache/ms-playwright
      V2BOARD_DEPLOY_ROOT: /app/frontend-deploy
    volumes: *frontend-volumes
    restart: "no"

  rust-migrate:
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-api -- migrate
    environment: *rust-environment
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    volumes: *rust-volumes

  rust-api:
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-api
    environment:
      <<: *rust-environment
      RUST_LOG: ${RUST_LOG:-v2board_api=info,tower_http=info}
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rust-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      start_period: 180s
      retries: 24
    ports:
      - "8000:8080"
    volumes:
      - ./backend/rust:/src/backend/rust:ro
      - rust-cargo-registry:/usr/local/cargo/registry
      - rust-cargo-git:/usr/local/cargo/git
      - rust-target:/app/target
      - v2board-runtime:/var/lib/v2board
      - frontend-deploy:/app/frontend-deploy:ro

  rust-worker:
    build:
      context: .
      dockerfile: Dockerfile.rust
      target: development
    image: v2board-rust-dev
    init: true
    working_dir: /src/backend/rust
    command: cargo run --locked -p v2board-workers
    environment:
      <<: *rust-environment
      RUST_LOG: ${RUST_WORKER_LOG:-v2board_workers=info}
    depends_on:
      rust-api:
        condition: service_healthy
    volumes: *rust-volumes

  frontend:
    image: v2board-frontend-dev
    init: true
    working_dir: /app/frontend
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        pnpm config set store-dir /app/frontend/.pnpm-store
        pnpm install --frozen-lockfile
        exec pnpm --filter @v2board/user --filter @v2board/admin --parallel run dev
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      PLAYWRIGHT_BROWSERS_PATH: /app/frontend/.cache/ms-playwright
      VITE_API_BASE: http://rust-api:8080
      VITE_DEV_ADMIN_PATH: ${V2BOARD_FRONTEND_ADMIN_PATH:-admin}
    depends_on:
      rust-api:
        condition: service_healthy
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes: *frontend-dev-volumes

  reference-oracle:
    profiles: ["reference"]
    image: v2board-frontend-dev
    init: true
    working_dir: /app/frontend
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        test -f /reference/public/theme/default/dashboard.blade.php
        exec node scripts/serve-oracle.mjs
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /app/frontend/.cache/ms-playwright
      REFERENCE_ORACLE_ROOT: /reference
      REFERENCE_ORACLE_STATE_ROOT: /tmp/v2board-reference-oracle
      VISUAL_PARITY_ADMIN_PATH: ${V2BOARD_FRONTEND_ADMIN_PATH:-admin}
      VISUAL_PARITY_ORACLE_HOST: 0.0.0.0
      VISUAL_PARITY_ORACLE_PORT: "8001"
      VISUAL_PARITY_PUBLIC_ORACLE_HOST: localhost
      VISUAL_PARITY_SOURCE_BASE_URL: http://rust-api:8080
    depends_on:
      rust-api:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes: *reference-frontend-volumes

  mysql:
    image: mysql:8.4.10@sha256:c831a0f11348d402b43d77453e17d770be2eef356615a2823fe0f5a0d6c8b9af
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: v2board
      MYSQL_USER: v2board
      MYSQL_PASSWORD: v2board
      MYSQL_ROOT_PASSWORD: v2board
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pv2board"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:v1.30.3@sha256:956d688cbd13dca36c72d8e94c34d6d1cdf4a005aa6aa4ff6edaaac56c34d8df
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  frontend-workspace:
  frontend-deploy:
  frontend-interaction-artifacts:
  frontend-node_modules:
  frontend-pnpm-store:
  frontend-playwright-cache:
  frontend-admin-node_modules:
  frontend-user-node_modules:
  frontend-api-client-node_modules:
  frontend-config-node_modules:
  frontend-i18n-node_modules:
  frontend-types-node_modules:
  mysql-data:
  redis-data:
  rust-cargo-registry:
  rust-cargo-git:
  rust-target:
  v2board-runtime:
